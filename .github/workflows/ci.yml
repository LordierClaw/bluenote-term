name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check environment
        run: bun run check:env

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Smoke check OpenTUI import
        run: bun run smoke:opentui

      - name: Smoke check CLI
        run: bun run smoke:cli
