name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish package and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run public gate
        run: bun run check

      - name: Verify npm package publish shape
        run: npm pack --dry-run --json
        working-directory: packages/term

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./packages/term/package.json').version")
          RELEASE_TAG="v${PACKAGE_VERSION}"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/term/package.json version ${RELEASE_TAG}." >&2
            exit 1
          fi

      - name: Publish npm package
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish --access public
        working-directory: packages/term
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.meta.outputs.release_tag }}
          body: |
            Published `@lordierclaw/bluenote-term@${{ steps.meta.outputs.package_version }}` from `packages/term`.

            Exact runtime dependency:
            - `@lordierclaw/bluenote-core@${{ steps.meta.outputs.package_version }}`
