name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run public gate
        run: bun run check

      - name: Package release asset
        run: bun run package:release

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v7
        with:
          name: bluenote-windows-x64
          path: |
            dist/release/bn.exe
            dist/release/bluenote-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run public gate
        run: bun run check

      - name: Package release asset
        run: bun run package:release

      - name: Upload Linux release asset
        uses: actions/upload-artifact@v7
        with:
          name: bluenote-linux-x64
          path: dist/release/bluenote-linux-x64.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist/release-assets
          sha256sum \
            bluenote-windows-x64/bn.exe \
            bluenote-windows-x64/bluenote-windows-x64.zip \
            bluenote-linux-x64/bluenote-linux-x64.tar.gz \
            | sed 's#bluenote-windows-x64/##; s#bluenote-linux-x64/##' \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt
          {
            echo "## SHA-256 checksums"
            echo
            echo '```text'
            cat SHA256SUMS.txt
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: dist/release-assets/RELEASE_NOTES.md
          files: |
            dist/release-assets/bluenote-windows-x64/bn.exe
            dist/release-assets/bluenote-windows-x64/bluenote-windows-x64.zip
            dist/release-assets/bluenote-linux-x64/bluenote-linux-x64.tar.gz
