name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run public gate
        run: bun run check

      - name: Verify npm package publish shape
        run: npm pack --dry-run --json
        working-directory: packages/term

      - name: Verify release metadata
        if: github.event_name == 'release'
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./packages/term/package.json').version")
          RELEASE_TAG="v${PACKAGE_VERSION}"
          if [[ "${RELEASE_TAG_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag ${RELEASE_TAG_NAME} does not match packages/term/package.json version ${RELEASE_TAG}." >&2
            exit 1
          fi

  publish:
    name: Publish npm package
    needs: verify
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish npm package
        run: npm publish --access public
        working-directory: packages/term
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
