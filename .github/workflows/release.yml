name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Require successful push CI workflow for release commit
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUIRED_WORKFLOW_NAME: CI
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_SHA="$(git rev-parse HEAD)"
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          sha = os.environ["RELEASE_SHA"]
          workflow_name = os.environ["REQUIRED_WORKFLOW_NAME"]
          deadline = time.time() + 600

          def fetch_runs():
              query = urllib.parse.urlencode({"event": "push", "head_sha": sha, "per_page": 100})
              url = f"https://api.github.com/repos/{repo}/actions/runs?{query}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          last_status = None
          while True:
              runs = [
                  run for run in fetch_runs().get("workflow_runs", [])
                  if run.get("name") == workflow_name and run.get("head_sha") == sha
              ]
              runs.sort(key=lambda run: run.get("created_at", ""), reverse=True)

              if runs:
                  run = runs[0]
                  status = run.get("status")
                  conclusion = run.get("conclusion")
                  html_url = run.get("html_url")
                  last_status = f"{workflow_name} run {run.get('id')} status={status} conclusion={conclusion} url={html_url}"
                  print(last_status)
                  if status == "completed":
                      if conclusion != "success":
                          raise SystemExit(
                              f"Release blocked: required push workflow '{workflow_name}' for {sha} concluded {conclusion}.\n{html_url}"
                          )
                      print(f"Release gate confirmed green push workflow '{workflow_name}' for {sha}.")
                      break
              else:
                  last_status = f"Waiting for push workflow '{workflow_name}' for release commit {sha}."
                  print(last_status)

              if time.time() >= deadline:
                  raise SystemExit(f"Release blocked: {last_status}")

              time.sleep(15)
          PY

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run public gate
        run: bun run check

      - name: Verify npm package publish shape
        run: npm pack --dry-run --json
        working-directory: packages/term

      - name: Verify release metadata
        if: github.event_name == 'release'
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./packages/term/package.json').version")
          RELEASE_TAG="v${PACKAGE_VERSION}"
          if [[ "${RELEASE_TAG_NAME}" != "${RELEASE_TAG}" ]]; then
            echo "Release tag ${RELEASE_TAG_NAME} does not match packages/term/package.json version ${RELEASE_TAG}." >&2
            exit 1
          fi

  build-release-linux:
    name: Build Linux portable release asset
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release asset
        run: bun run package:release

      - name: Upload release asset to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG_NAME" dist/release/bluenote-${{ github.event.release.tag_name }}-linux-x64.tar.gz --clobber

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: bluenote-${{ github.ref_name }}-linux-x64
          path: dist/release/bluenote-v*-linux-x64.tar.gz

  build-release-windows:
    name: Build Windows portable release asset
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release asset
        run: bun run package:release

      - name: Upload release asset to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: gh release upload "$RELEASE_TAG_NAME" dist/release/bluenote-${{ github.event.release.tag_name }}-windows-x64.zip --clobber

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: bluenote-${{ github.ref_name }}-windows-x64
          path: dist/release/bluenote-v*-windows-x64.zip

  publish:
    name: Publish npm package
    needs:
      - verify
      - build-release-linux
      - build-release-windows
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish npm package
        run: npm publish --access public
        working-directory: packages/term
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
